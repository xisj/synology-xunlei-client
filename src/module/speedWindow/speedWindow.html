<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载速度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 170px;
            height: 52px;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
            /* 预留一圈透明边距给 CSS 阴影，胶囊右对齐贴近屏幕右边 */
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        #container {
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 2px 10px rgba(47, 108, 255, 0.22);
            padding: 5px 12px 5px 5px;
        }
        #icon {
            flex: 0 0 auto;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f8bff 0%, #2f6cff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
        }
        #icon svg {
            width: 20px;
            height: 20px;
        }
        #info {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #speed {
            color: #2f6cff;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #label {
            color: #9aa0ad;
            font-size: 11px;
            font-weight: 400;
            line-height: 1.15;
            margin-top: 1px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3v11m0 0l-4-4m4 4l4-4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 18h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </div>
        <div id="info">
            <div id="speed">等待数据...</div>
            <div id="label">下载速度</div>
        </div>
    </div>
    <script>
        const { ipcRenderer } = require('electron')

        const speedEl = document.getElementById('speed')
        let rawSpeed = null        // 主进程传来的原始速度
        let lastCheckedRaw = null   // 3 秒前的原始速度
        let holding = false         // 抖动保持中，暂停显示更新

        // 接收速度更新
        ipcRenderer.on('speed-update', (e, speed) => {
            rawSpeed = speed
            // 抖动保持期间不覆盖显示，避免抖动值被立即覆盖
            if (!holding) {
                speedEl.textContent = speed
            }
        })

        // 每 3 秒检查：若速度与 3 秒前相同，则显示随机增减 0.1~0.2 的抖动值，
        // 保持 1 秒后再恢复为真实值
        setInterval(() => {
            if (rawSpeed === null) return
            if (rawSpeed === lastCheckedRaw) {
                const match = rawSpeed.match(/^([\d.]+)(.*)$/)
                if (match) {
                    let num = parseFloat(match[1])
                    const unit = match[2]
                    const delta = (0.1 + Math.random() * 0.1) * (Math.random() < 0.5 ? -1 : 1)
                    const jittered = Math.max(0, num + delta).toFixed(1) + unit
                    holding = true
                    speedEl.textContent = jittered
                    // 保持 1 秒后恢复真实值（期间不被 speed-update 覆盖）
                    setTimeout(() => {
                        holding = false
                        speedEl.textContent = rawSpeed
                    }, 1000)
                }
            } else {
                lastCheckedRaw = rawSpeed
            }
        }, 3000)
        
        // 拖拽与点击处理
        // 拖拽由主进程用 screen.getCursorScreenPoint() 定位，避免高 DPI 缩放下窗口漂移
        let isDragging = false
        let startX = 0
        let startY = 0
        let moved = false

        const containerEl = document.getElementById('container')

        containerEl.addEventListener('mousedown', (e) => {
            isDragging = true
            moved = false
            startX = e.screenX
            startY = e.screenY
            ipcRenderer.send('speed-window-drag-start')
        })

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return
            // 超过阈值视为拖拽
            if (Math.abs(e.screenX - startX) > 3 || Math.abs(e.screenY - startY) > 3) {
                moved = true
            }
            if (moved) {
                ipcRenderer.send('speed-window-drag-move')
            }
        })

        window.addEventListener('mouseup', () => {
            if (isDragging && !moved) {
                // 未拖动，视为点击
                console.log('speed window clicked')
                ipcRenderer.send('speed-window-click')
            }
            isDragging = false
        })
    </script>
</body>
</html>
