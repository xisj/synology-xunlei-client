<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载速度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 510px;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
            /* 预留透明边距给 CSS 阴影，底部留更多空间避免阴影被裁切 */
            padding: 20px 6px 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #container {
            -webkit-app-region: no-drag;
            position: relative;
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 2px 10px rgba(47, 108, 255, 0.22);
            padding: 1px 12px 1px 0;
            overflow: visible;
            height: 35px;
        }
        #container.no-tasks {
            padding: 5px;
            border-radius: 50%;
            box-shadow: none;
            background: transparent;
        }
        #icon {
            flex: 0 0 auto;
            width: 52px;
            height: 52px;
            border-radius: 0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
            margin-left: -14px;
            margin-top: 0px;
            position: relative;
            z-index: 1;
        }

        #icon img {
            width: 130%;
            height: 130%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
            position: relative;
            left: -15%;
            top: -15%;
        }
        #icon svg {
            width: 20px;
            height: 20px;
        }
        #icon video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            display: none;
        }
        #icon canvas {
            width: 100%;
            height: 100%;
            pointer-events: none;
            user-select: none;
        }
        #info {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 0;
        }
        #speed {
            color: #2f6cff;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0;
            margin: 0;
        }
        #label {
            color: #9aa0ad;
            font-size: 12px;
            font-weight: 400;
            line-height: 1;
            margin-top: 0;
            padding: 3px 0 0 0;
        }
        .no-tasks #speed,
        .no-tasks #label {
            display: none;
        }
        .no-tasks #info {
            display: none;
        }
        .no-tasks #icon {
            margin: 0;
        }
        #progress-fill {
            position: absolute;
            left: 8px;
            right: 10px;
            bottom: 0;
            height: 0%;
            opacity: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(126, 198, 255, 0.08) 0%, rgba(126, 198, 255, 0.18) 100%);
            transition: height 0.35s ease, opacity 0.35s ease;
            border-radius: 0 22px 22px 22px;
            overflow: hidden;
            clip-path: inset(0 0 0 0 round 0 0 22px 22px);
        }
        .progress-wave {
            position: absolute;
            left: -18%;
            width: 136%;
            border-radius: 50%;
            pointer-events: none;
        }
        .progress-wave.wave-1 {
            top: -8px;
            height: 32px;
            background: rgba(139, 208, 255, 0.42);
            animation: waveFlowA 4.2s linear infinite;
        }
        .progress-wave.wave-2 {
            top: -4px;
            height: 26px;
            background: rgba(183, 228, 255, 0.52);
            animation: waveFlowB 3.1s linear infinite;
        }
        @keyframes waveFlowA {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(12%);
            }
        }
        @keyframes waveFlowB {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-10%);
            }
        }
        #task-list {
            display: none;
            position: relative;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            margin-top: 8px;
            padding: 8px 0;
            width: 498px;
            max-height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        #task-list::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        #task-list.show {
            display: block;
            animation: slideDown 0.2s ease-out;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .task-item {
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: default;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        .task-item:last-child {
            border-bottom: none;
        }
        .task-item:hover {
            background: #f5f8ff;
        }
        .task-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--task-progress, 0%);
            pointer-events: none;
            background: linear-gradient(90deg, rgba(126, 198, 255, 0.08) 0%, rgba(126, 198, 255, 0.18) 100%);
            transition: width 0.35s ease;
            z-index: 0;
        }
        .task-progress-wave {
            position: absolute;
            left: -18%;
            width: 136%;
            border-radius: 50%;
            pointer-events: none;
        }
        .task-progress-wave.wave-1 {
            top: -16px;
            height: 32px;
            background: rgba(139, 208, 255, 0.42);
            animation: taskWaveFlowA 4.2s linear infinite;
        }
        .task-progress-wave.wave-2 {
            top: -12px;
            height: 26px;
            background: rgba(183, 228, 255, 0.52);
            animation: taskWaveFlowB 3.1s linear infinite;
        }
        @keyframes taskWaveFlowA {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(12%);
            }
        }
        @keyframes taskWaveFlowB {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-10%);
            }
        }
        .task-name {
            font-size: 12px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }
        .task-meta {
            font-size: 10px;
            color: #999;
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }
        .task-status {
            font-weight: 500;
        }
        .task-status.running {
            color: #2f6cff;
        }
        .task-status.done {
            color: #52c41a;
        }
        .empty-tip {
            padding: 12px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="progress-fill">
            <div class="progress-wave wave-1"></div>
            <div class="progress-wave wave-2"></div>
        </div>
        <div id="icon">
            <video id="bird-video" src="assets/bird720.mp4" muted playsinline></video>
            <canvas id="bird-canvas"></canvas>

    <script>
        const { ipcRenderer } = require('electron')

        const speedEl = document.getElementById('speed')
        const labelEl = document.getElementById('label')
        const progressFillEl = document.getElementById('progress-fill')
        const containerEl = document.getElementById('container')
        const birdVideo = document.getElementById('bird-video')
        const birdCanvas = document.getElementById('bird-canvas')
        let rawSpeed = null        // 主进程传来的原始速度
        let lastCheckedRaw = null   // 3 秒前的原始速度
        let holding = false         // 抖动保持中，暂停显示更新
        let hasActiveSpeed = false  // 当前总速度是否大于 0
        let lastTaskCount = 0       // 上一次的任务数量，用于检测变化
        let videoAnimationId = null // 视频渲染动画帧 ID

        // Canvas 色键过滤：将白色背景 (fdfdf9 ~ fffff) 转为透明
        function processVideoFrame() {
            if (!birdVideo || !birdCanvas) return

            const ctx = birdCanvas.getContext('2d')
            const width = birdCanvas.width = 52
            const height = birdCanvas.height = 52

            // 软色键 + 羽化过渡：根据像素到白色的距离做平滑 alpha 渐变，
            // 消除抗锯齿边缘的白色毛刺。
            // dist = 到白色的距离（0=纯白，越大越远离白色）
            // dist <= lower：完全透明（背景）
            // dist >= upper：完全不透明（前景）
            // 中间：线性过渡（羽化），并对边缘像素去除白色溢出
            const lower = 30  // 低于此距离视为纯背景
            const upper = 55  // 高于此距离视为纯前景

            function render() {
                if (birdVideo.paused || birdVideo.ended) {
                    videoAnimationId = null
                    // 播放结束后跳回第一帧并停止
                    if (birdVideo.ended) {
                        birdVideo.currentTime = 0
                        birdVideo.pause()
                        // 渲染第一帧
                        ctx.drawImage(birdVideo, 0, 0, width, height)
                        const imageData = ctx.getImageData(0, 0, width, height)
                        const data = imageData.data
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i]
                            const g = data[i + 1]
                            const b = data[i + 2]
                            const dist = Math.max(255 - r, 255 - g, 255 - b)
                            if (dist <= lower) {
                                data[i + 3] = 0
                            } else if (dist < upper) {
                                const t = (dist - lower) / (upper - lower)
                                data[i + 3] = Math.round(255 * t)
                                const f = t
                                data[i] = Math.round((r - 255 * (1 - f)) / f)
                                data[i + 1] = Math.round((g - 255 * (1 - f)) / f)
                                data[i + 2] = Math.round((b - 255 * (1 - f)) / f)
                            }
                        }
                        ctx.putImageData(imageData, 0, 0)
                    }
                    return
                }

                ctx.drawImage(birdVideo, 0, 0, width, height)
                const imageData = ctx.getImageData(0, 0, width, height)
                const data = imageData.data

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i]
                    const g = data[i + 1]
                    const b = data[i + 2]

                    // 到白色的距离（取各通道距白最大值）
                    const dist = Math.max(255 - r, 255 - g, 255 - b)

                    if (dist <= lower) {
                        // 纯白背景，完全透明
                        data[i + 3] = 0
                    } else if (dist < upper) {
                        // 边缘过渡区：羽化 alpha + 去白溢出
                        const t = (dist - lower) / (upper - lower) // 0~1
                        data[i + 3] = Math.round(255 * t)
                        // 去白溢出：把白色分量按比例减去，让边缘颜色更接近真实描边色
                        const f = t // 前景占比
                        data[i] = Math.round((r - 255 * (1 - f)) / f)
                        data[i + 1] = Math.round((g - 255 * (1 - f)) / f)
                        data[i + 2] = Math.round((b - 255 * (1 - f)) / f)
                    }
                    // dist >= upper：保持原样（完全不透明）
                }

                ctx.putImageData(imageData, 0, 0)
                videoAnimationId = requestAnimationFrame(render)
            }

            render()
        }

        // 播放鸟动画一次
        function playBirdAnimation() {
            if (birdVideo) {
                birdVideo.currentTime = 0
                birdVideo.play().catch(err => console.log('Video play error:', err))
                // 开始 Canvas 渲染
                if (videoAnimationId) cancelAnimationFrame(videoAnimationId)
                processVideoFrame()
            }
        }

        // 接收速度更新
        ipcRenderer.on('speed-update', (e, speed) => {
            rawSpeed = speed
            const match = String(speed || '').match(/^([\d.]+)(KB\/s|MB\/s|GB\/s)?$/)
            let speedValue = 0
            if (match) {
                speedValue = parseFloat(match[1]) || 0
                const unit = match[2] || ''
                if (unit === 'MB/s') speedValue *= 1024
                if (unit === 'GB/s') speedValue *= 1024 * 1024
            }
            hasActiveSpeed = speedValue > 0
            if (!hasActiveSpeed) {
                holding = false
            }
            // 抖动保持期间不覆盖显示，避免抖动值被立即覆盖
            if (!holding) {
                speedEl.textContent = speed
            }
        })

        // 接收总进度更新
        ipcRenderer.on('overall-progress-update', (e, data) => {
            if (data) {
                const progress = data.progress || 0
                const taskCount = data.taskCount || 0
                labelEl.textContent = `${taskCount} 任务 ${progress}%`
                const clampedProgress = Math.max(0, Math.min(100, progress))
                progressFillEl.style.height = `${clampedProgress}%`
                progressFillEl.style.opacity = clampedProgress > 0 ? '1' : '0'

                // 根据任务数控制显示状态
                if (taskCount === 0) {
                    containerEl.classList.add('no-tasks')
                } else {
                    containerEl.classList.remove('no-tasks')
                }

                // 检测任务数量变化，播放动画
                if (taskCount !== lastTaskCount) {
                    playBirdAnimation()
                    lastTaskCount = taskCount
                }
            }
        })

        // 每 3 秒检查：若速度与 3 秒前相同，则显示随机增减 0.1~0.2 的抖动值，
        // 保持 1 秒后再恢复为真实值
        setInterval(() => {
            if (rawSpeed === null) return
            if (!hasActiveSpeed) {
                lastCheckedRaw = rawSpeed
                if (!holding) {
                    speedEl.textContent = rawSpeed
                }
                return
            }
            if (rawSpeed === lastCheckedRaw) {
                const match = rawSpeed.match(/^([\d.]+)(.*)$/)
                if (match) {
                    let num = parseFloat(match[1])
                    const unit = match[2]
                    const delta = (0.1 + Math.random() * 0.1) * (Math.random() < 0.5 ? -1 : 1)
                    const jittered = Math.max(0, num + delta).toFixed(1) + unit
                    holding = true
                    speedEl.textContent = jittered
                    // 保持 1 秒后恢复真实值（期间不被 speed-update 覆盖）
                    setTimeout(() => {
                        holding = false
                        speedEl.textContent = rawSpeed
                    }, 1000)
                }
            } else {
                lastCheckedRaw = rawSpeed
            }
        }, 3000)
        
        // 拖拽与点击处理
        // 拖拽由主进程用 screen.getCursorScreenPoint() 定位，避免高 DPI 缩放下窗口漂移
        let isDragging = false
        let startX = 0
        let startY = 0
        let moved = false
        let rafId = null  // requestAnimationFrame ID，用于节流

        document.body.addEventListener('mousedown', (e) => {
            // 如果点击的是任务列表，不触发拖拽
            if (e.target.closest('#task-list')) return
            isDragging = true
            moved = false
            startX = e.screenX
            startY = e.screenY
            // 拖动时隐藏任务列表，避免列表被裁切只露出顶部阴影
            const tl = document.getElementById('task-list')
            tl.classList.remove('show')
            ipcRenderer.send('speed-window-drag-start')
        })

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return
            // 超过阈值视为拖拽
            if (Math.abs(e.screenX - startX) > 3 || Math.abs(e.screenY - startY) > 3) {
                moved = true
            }
            if (moved) {
                // 直接发送消息，不使用节流，提高响应速度
                ipcRenderer.send('speed-window-drag-move')
            }
        })

        window.addEventListener('mouseup', () => {
            if (isDragging && !moved) {
                // 未拖动，视为点击
                console.log('speed window clicked')
                ipcRenderer.send('speed-window-click')
            } else if (isDragging && moved) {
                // 拖动结束，保存位置
                ipcRenderer.send('speed-window-drag-end')
            }
            isDragging = false
            if (rafId) {
                cancelAnimationFrame(rafId)
                rafId = null
            }
        })

        // 任务列表显示逻辑
        const taskListEl = document.getElementById('task-list')
        const speedContainerEl = document.getElementById('container')
        let isTaskListVisible = false  // 任务列表是否正在显示

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (!bytes || bytes === '0') return '未知'
            const num = parseInt(bytes, 10)
            if (num >= 1024 * 1024 * 1024) {
                return (num / 1024 / 1024 / 1024).toFixed(1) + 'GB'
            } else if (num >= 1024 * 1024) {
                return (num / 1024 / 1024).toFixed(1) + 'MB'
            } else if (num >= 1024) {
                return (num / 1024).toFixed(1) + 'KB'
            }
            return num + 'B'
        }

        // 渲染任务列表（只显示正在下载的任务）
        function renderTaskList(tasks) {
            if (!tasks || tasks.length === 0) {
                taskListEl.innerHTML = '<div class="empty-tip">暂无任务</div>'
                return
            }
            // 过滤：只显示正在下载的任务
            const runningTasks = tasks.filter(task => task.isRunning)
            if (runningTasks.length === 0) {
                taskListEl.innerHTML = '<div class="empty-tip">暂无下载任务</div>'
                return
            }
            let html = ''
            runningTasks.forEach(task => {
                const name = task.fileName || task.name || '未知任务'
                const size = formatFileSize(task.fileSize)
                const progress = task.progress || 0
                const speed = task.speed > 0 ? (task.speed / 1024).toFixed(1) + 'KB/s' : '0KB/s'
                const clampedProgress = Math.max(0, Math.min(100, progress))
                html += `
                    <div class="task-item" style="--task-progress: ${clampedProgress}%">
                        <div class="task-progress-fill">
                            ${clampedProgress > 0 ? '<div class="task-progress-wave wave-1"></div><div class="task-progress-wave wave-2"></div>' : ''}
                        </div>
                        <div class="task-name" title="${name}">${name}</div>
                        <div class="task-meta">
                            <span>${size} · ${progress}%</span>
                            <span class="task-status running">下载中 · ${speed}</span>
                        </div>
                    </div>
                `
            })
            taskListEl.innerHTML = html
        }

        // 鼠标悬停显示任务列表（拖动中不请求）
        speedContainerEl.addEventListener('mouseenter', () => {
            if (isDragging) return
            console.log('mouseenter, requesting task list')
            ipcRenderer.send('get-task-list')
        })

        // 监听任务列表更新通知，如果任务列表正在显示则自动刷新
        ipcRenderer.on('task-list-update', () => {
            if (isTaskListVisible && !isDragging) {
                console.log('task-list-update received, refreshing task list')
                ipcRenderer.send('get-task-list')
            }
        })

        // body 上下内边距（与 CSS padding 对应：top 20 + bottom 30）
        const TOP_PAD = 20
        const BOTTOM_PAD = 30   // 底部留白，避免阴影被裁切
        const TASK_MARGIN = 8   // 任务列表与胶囊的间距

        // 收起状态窗口高度（胶囊 + 上下留白）
        function getCollapsedHeight() {
            return TOP_PAD + speedContainerEl.offsetHeight + BOTTOM_PAD
        }

        // 初始化时按胶囊实际高度精确设置窗口高度，保证底部阴影完整显示
        window.addEventListener('DOMContentLoaded', () => {
            ipcRenderer.send('resize-speed-window', getCollapsedHeight())
            // 启动时播放一次动画
            playBirdAnimation()
        })

        // 接收任务列表响应
        ipcRenderer.on('task-list-response', (e, data) => {
            if (isDragging) return  // 拖动中不展开列表
            console.log('task-list-response received:', data.tasks?.length)
            renderTaskList(data.tasks)
            taskListEl.classList.add('show')
            isTaskListVisible = true
            // 调整窗口高度（含底部阴影留白）
            const totalHeight = TOP_PAD + speedContainerEl.offsetHeight + TASK_MARGIN + taskListEl.offsetHeight + BOTTOM_PAD
            ipcRenderer.send('resize-speed-window', totalHeight)
        })

        // 鼠标离开隐藏任务列表
        document.body.addEventListener('mouseleave', () => {
            taskListEl.classList.remove('show')
            isTaskListVisible = false
            // 恢复窗口高度
            ipcRenderer.send('resize-speed-window', getCollapsedHeight())
        })

        // 点击任务列表也唤起主窗口
        taskListEl.addEventListener('click', () => {
            console.log('task list clicked')
            ipcRenderer.send('speed-window-click')
        })

        // 窗口失去焦点时隐藏任务列表
        window.addEventListener('blur', () => {
            console.log('window blurred, hiding task list')
            const tl = document.getElementById('task-list')
            tl.classList.remove('show')
        })

        // 右键菜单：发送 IPC 到主进程，使用 Electron 原生 Menu
        speedContainerEl.addEventListener('contextmenu', (e) => {
            e.preventDefault()
            ipcRenderer.send('speed-window-contextmenu', { type: 'speed-window' })
        })

        // 任务列表项右键菜单
        taskListEl.addEventListener('contextmenu', (e) => {
            const taskItem = e.target.closest('.task-item')
            if (taskItem) {
                e.preventDefault()
                const taskName = taskItem.querySelector('.task-name').textContent
                // 发送鼠标位置，用于菜单定位
                ipcRenderer.send('speed-window-contextmenu', { type: 'task-item', taskName, x: e.clientX, y: e.clientY })
            }
        })
    </script>
</body>
</html>
